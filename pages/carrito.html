<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Compras | Honatu</title>
  <meta name="description" content="Revisa tu carrito de compras y procede al pago seguro.">

  
  <link rel="icon" href="/Honatu-Hidroponia/assets/Logo-jkPMiWcb.png" type="image/png">
  <script type="module" crossorigin src="/Honatu-Hidroponia/assets/app-QZHnWQlE.js"></script>
  <link rel="stylesheet" crossorigin href="/Honatu-Hidroponia/assets/main-C75-aWzi.css">
  <link rel="stylesheet" crossorigin href="/Honatu-Hidroponia/assets/ecommerce-BSRkyPPq.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar navbar--solid" role="navigation">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" aria-label="Inicio">
        <img src="/Honatu-Hidroponia/assets/Logo-jkPMiWcb.png" alt="Honatu">
      </a>
      <div id="navMenu" class="nav-menu">
        <a href="../index.html#nosotros" class="nav-link">Nosotros</a>
        <a href="tienda.html" class="nav-link">Tienda</a>
      </div>
      <div class="nav-right">
        <a href="favoritos.html" class="nav-cart" aria-label="Favoritos">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </a>
        <button id="userLoginToggle" class="nav-cart" aria-label="Usuario">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </button>
      </div>
    </div>
  </nav>

  <main style="padding-top: 120px; padding-bottom: 80px;">
    <div class="container">
      <h1 class="section-title" style="margin-bottom: var(--space-2xl);">Tu Carrito</h1>
      
      <div class="checkout-layout">
        <div class="checkout-items" id="fullCartItems">
          <!-- Populated by JS -->
          <p style="color: var(--color-gray-500);">Cargando carrito...</p>
        </div>
        
        <div class="checkout-summary">
          <h3>Resumen del Pedido</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="checkoutSubtotal">$0 MXN</span>
          </div>
          <div class="summary-row">
            <span>Envío Estimado</span>
            <span>$150 MXN</span>
          </div>
          <hr style="margin: var(--space-md) 0; border: none; border-top: 1px solid var(--color-gray-200);">
          <div class="summary-row summary-total">
            <span>Total</span>
            <span id="checkoutTotal">$0 MXN</span>
          </div>
          <a href="checkout.html" class="btn btn-terracotta" style="width: 100%; margin-top: var(--space-lg); justify-content: center; text-decoration: none;">Finalizar Compra</a>
          
          <div style="margin-top: var(--space-lg); display: flex; align-items: center; gap: 8px; color: var(--color-gray-500); font-size: 0.85rem; justify-content: center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Pago Seguro Encriptado
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Honatu. Todos los derechos reservados.</p>
      </div>
    </div>
  </footer>

  <!-- LOGIN MODAL OMITTED BUT NEEDED FOR JS ERRORS, WE ADD IT QUICKLY -->
  <div id="loginOverlay" class="login-overlay"></div>
  <div id="loginModal" class="login-modal" aria-hidden="true" role="dialog">
    <div class="login-modal-content">
      <button id="loginClose" class="login-close" aria-label="Cerrar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="login-header"><h2 id="loginTitle">Inicia Sesión</h2><p id="loginSubtitle">Inicia sesión primero para poder comprar o guardar favoritos.</p></div>
      <form id="loginForm" class="login-form">
        <div class="form-group"><label class="form-label" for="loginEmail">Correo</label><input type="email" id="loginEmail" class="form-input" required></div>
        <div class="form-group"><label class="form-label" for="loginPassword">Contraseña</label><input type="password" id="loginPassword" class="form-input" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Re-render cart specifically for full checkout page
      const cart = JSON.parse(localStorage.getItem('honatu-cart') || '[]');
      const fullCartItems = document.getElementById('fullCartItems');
      const checkoutSubtotal = document.getElementById('checkoutSubtotal');
      const checkoutTotal = document.getElementById('checkoutTotal');
      
      const calcTotal = () => cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      
      const renderFullCart = () => {
        if (!fullCartItems) return;
        
        if (cart.length === 0) {
          fullCartItems.innerHTML = '<div style="text-align: center; padding: var(--space-3xl) 0; color: var(--color-gray-400);">Tu carrito está vacío. <br><br><a href="tienda.html" class="btn btn-secondary">Ir a la tienda</a></div>';
          checkoutSubtotal.textContent = '$0 MXN';
          checkoutTotal.textContent = '$0 MXN';
          return;
        }
        
        fullCartItems.innerHTML = cart.map(item => `
          <div class="checkout-item" data-id="${item.id}">
            <img src="${item.img}" alt="${item.name}">
            <div class="checkout-item-info">
              <h4>${item.name}</h4>
              <p class="price">$${item.price.toLocaleString('es-MX')} MXN</p>
            </div>
            <div class="checkout-item-qty">
              <span>Cant: ${item.qty}</span>
            </div>
          </div>
        `).join('');
        
        const sub = calcTotal();
        checkoutSubtotal.textContent = '$' + sub.toLocaleString('es-MX') + ' MXN';
        checkoutTotal.textContent = '$' + (sub + 150).toLocaleString('es-MX') + ' MXN'; // Adds shipping
      };
      
      renderFullCart();
    });
  </script>
</body>
</html>
