<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tus Favoritos | Honatu</title>
  <meta name="description" content="Tus productos hidropónicos favoritos guardados en Honatu.">

  <link rel="stylesheet" href="../css/main.css">
  
  <link rel="stylesheet" href="../css/pages/ecommerce.css">
  <link rel="icon" href="../assets/logo/Logo.png" type="image/png">
  <script type="module" src="../js/app.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar navbar--solid" role="navigation">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo" aria-label="Inicio">
        <img src="../assets/logo/Logo.png" alt="Honatu">
      </a>
      <div id="navMenu" class="nav-menu">
        <a href="../index.html#nosotros" class="nav-link">Nosotros</a>
        <a href="tienda.html" class="nav-link">Tienda</a>
      </div>
      <div class="nav-right">
        <a href="favoritos.html" class="nav-cart active" aria-label="Favoritos">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </a>
        <button id="userLoginToggle" class="nav-cart" aria-label="Usuario">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </button>
        <button id="cartToggle" class="nav-cart" aria-label="Carrito de compras">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span id="cartBadge" class="cart-badge">0</span>
        </button>
        <button id="navHamburger" class="nav-hamburger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main style="padding-top: 120px; padding-bottom: 80px;">
    <div class="container">
      <h1 class="section-title" style="margin-bottom: var(--space-xl);">Tus Favoritos</h1>
      
      <div id="favoritesGrid" class="shop-grid">
        <!-- Mock Favorite Product -->
        <article class="product-card">
          <div class="product-img-wrap">
            <img src="../assets/images/home/img_1.jpg" alt="Solución Nutritiva A+B">
            <button class="btn-favorite active" aria-label="Quitar de favoritos">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--color-terracotta)" stroke="var(--color-terracotta)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
          </div>
          <div class="product-body">
            <span class="product-category">Nutrientes</span>
            <h3 class="product-name">Solución Nutritiva A+B</h3>
            <p class="product-desc">Fórmula balanceada de macro y micronutrientes.</p>
            <div class="product-footer">
              <span class="product-price">$389 <small>MXN</small></span>
              <button class="btn-add-cart" aria-label="Agregar al carrito">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>
        </article>
      </div>
      
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Honatu. Todos los derechos reservados.</p>
      </div>
    </div>
  </footer>

  <!-- LOGIN MODAL OMITTED BUT NEEDED FOR JS ERRORS, WE ADD IT QUICKLY -->
  <div id="loginOverlay" class="login-overlay"></div>
  <div id="loginModal" class="login-modal" aria-hidden="true" role="dialog">
    <div class="login-modal-content">
      <button id="loginClose" class="login-close" aria-label="Cerrar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="login-header"><h2 id="loginTitle">Inicia Sesión</h2><p id="loginSubtitle">Inicia sesión primero para poder comprar o guardar favoritos.</p></div>
      <form id="loginForm" class="login-form">
        <div class="form-group"><label class="form-label" for="loginEmail">Correo</label><input type="email" id="loginEmail" class="form-input" required></div>
        <div class="form-group"><label class="form-label" for="loginPassword">Contraseña</label><input type="password" id="loginPassword" class="form-input" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- SLIDE-IN CART (shared) -->
  <div id="cartOverlay" class="cart-overlay"></div>
  <aside id="cartPanel" class="cart-panel" aria-label="Carrito de compras">
    <div class="cart-header">
      <h3>Tu Carrito</h3>
      <button id="cartClose" class="cart-close" aria-label="Cerrar carrito"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span class="cart-total-label">Total:</span><span id="cartTotal" class="cart-total-value">$0 MXN</span>
      </div>
      <a href="carrito.html" class="btn btn-terracotta btn-checkout" style="text-decoration: none; text-align: center;">Ver Carrito Completo &rarr;</a>
    </div>
  </aside>

</body>
</html>
