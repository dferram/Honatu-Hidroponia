<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra | Honatu</title>
  <meta name="description" content="Procesa tu pago de forma segura en Honatu.">

  <link rel="stylesheet" href="../css/main.css">
  
  <link rel="stylesheet" href="../css/pages/ecommerce.css">
  <link rel="icon" href="../assets/logo/Logo.png" type="image/png">
  <script type="module" src="../js/app.js"></script>
  <style>
    /* Specific styles for checkout page */
    .checkout-form-section {
      background: var(--color-white);
      padding: var(--space-xl);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      margin-bottom: var(--space-xl);
    }
    .checkout-form-section h3 {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      color: var(--color-forest);
      margin-bottom: var(--space-lg);
      border-bottom: 1px solid var(--color-gray-100);
      padding-bottom: var(--space-sm);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    .form-grid.full {
      grid-template-columns: 1fr;
    }
    .payment-method {
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .payment-method:hover {
      border-color: var(--color-sage);
    }
    .payment-method.active {
      border-color: var(--color-forest);
      background: rgba(14, 28, 21, 0.03);
    }
  </style>
</head>

<body>

  <!-- Minimal Navbar for Checkout -->
  <nav id="navbar" class="navbar navbar--solid" role="navigation">
    <div class="nav-container" style="justify-content: center;">
      <a href="../index.html" class="nav-logo" aria-label="Inicio">
        <img src="../assets/logo/Logo.png" alt="Honatu">
      </a>
    </div>
  </nav>

  <main style="padding-top: 120px; padding-bottom: 80px;">
    <div class="container">
      <h1 class="section-title" style="margin-bottom: var(--space-2xl); text-align: center;">Finalizar Compra</h1>
      
      <div class="checkout-layout">
        <!-- Forms -->
        <div>
          <!-- Shipping Form -->
          <section class="checkout-form-section">
            <h3>1. Dirección de Envío</h3>
            <form id="shippingForm">
              <div class="form-grid full">
                <div class="form-group">
                  <label class="form-label">Nombre Completo</label>
                  <input type="text" class="form-input" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Dirección (Calle y número)</label>
                  <input type="text" class="form-input" placeholder="Ej. Av. Siempreviva 742" required>
                </div>
              </div>
              <div class="form-grid" style="margin-top: var(--space-md);">
                <div class="form-group">
                  <label class="form-label">Ciudad</label>
                  <input type="text" class="form-input" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Código Postal</label>
                  <input type="text" class="form-input" required>
                </div>
              </div>
            </form>
          </section>

          <!-- Payment Form -->
          <section class="checkout-form-section">
            <h3>2. Método de Pago</h3>
            <div class="payment-method active">
              <input type="radio" name="payment" id="payCard" checked>
              <label for="payCard" style="flex:1; cursor:pointer; font-weight: 500;">Tarjeta de Crédito o Débito</label>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            </div>
            <div class="payment-method">
              <input type="radio" name="payment" id="payPaypal">
              <label for="payPaypal" style="flex:1; cursor:pointer; font-weight: 500;">PayPal</label>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11V7a5 5 0 0 1 10 0v4"></path><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect></svg>
            </div>

            <!-- Card Mock Fields -->
            <div id="cardFields" style="margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px dashed var(--color-gray-200);">
              <div class="form-group" style="margin-bottom: var(--space-md);">
                <label class="form-label">Número de Tarjeta</label>
                <input type="text" class="form-input" placeholder="0000 0000 0000 0000">
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Expiración (MM/AA)</label>
                  <input type="text" class="form-input" placeholder="MM/AA">
                </div>
                <div class="form-group">
                  <label class="form-label">CVC</label>
                  <input type="text" class="form-input" placeholder="123">
                </div>
              </div>
            </div>
          </section>
        </div>
        
        <!-- Summary Sidebar -->
        <aside class="checkout-summary">
          <h3>Resumen del Pedido</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="finalSubtotal">$0 MXN</span>
          </div>
          <div class="summary-row">
            <span>Envío Estándar</span>
            <span>$150 MXN</span>
          </div>
          <hr style="margin: var(--space-md) 0; border: none; border-top: 1px solid var(--color-gray-200);">
          <div class="summary-row summary-total">
            <span>Total a Pagar</span>
            <span id="finalTotal">$0 MXN</span>
          </div>
          
          <button id="btnConfirmPayment" class="btn btn-primary" style="width: 100%; margin-top: var(--space-xl); justify-content: center; height: 50px; font-size: 1.1rem;">
            Pagar Ahora
          </button>
          
          <div style="margin-top: var(--space-lg); display: flex; align-items: center; gap: 8px; color: var(--color-gray-500); font-size: 0.85rem; justify-content: center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Transacción 100% Segura
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Honatu. Todos los derechos reservados.</p>
      </div>
    </div>
  </footer>

  <!-- TOAST ELEMENT FOR ALERTS -->
  <div id="customToast" class="custom-toast"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cart = JSON.parse(localStorage.getItem('honatu-cart') || '[]');
      const finalSubtotal = document.getElementById('finalSubtotal');
      const finalTotal = document.getElementById('finalTotal');
      
      const calcTotal = () => cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const sub = calcTotal();
      
      if (finalSubtotal && finalTotal) {
        finalSubtotal.textContent = '$' + sub.toLocaleString('es-MX') + ' MXN';
        finalTotal.textContent = '$' + (sub > 0 ? sub + 150 : 0).toLocaleString('es-MX') + ' MXN';
      }

      // Mock Payment Process
      const btnConfirmPayment = document.getElementById('btnConfirmPayment');
      if (btnConfirmPayment) {
        btnConfirmPayment.addEventListener('click', () => {
          if (cart.length === 0) {
            if (typeof showToast === 'function') {
              showToast("Tu carrito está vacío.");
            } else {
              alert("Tu carrito está vacío.");
            }
            return;
          }
          
          // Show processing state
          btnConfirmPayment.textContent = 'Procesando...';
          btnConfirmPayment.disabled = true;
          btnConfirmPayment.style.opacity = '0.7';

          setTimeout(() => {
            // Empty Cart
            localStorage.setItem('honatu-cart', '[]');
            // Redirect to Thank You Page
            window.location.href = 'gracias.html';
          }, 1500);
        });
      }
    });
  </script>
</body>
</html>
