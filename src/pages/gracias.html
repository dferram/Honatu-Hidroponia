<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias por tu compra! | Honatu</title>
  
  <link rel="stylesheet" href="../css/main.css">
  
  <link rel="icon" href="../assets/logo/Logo.png" type="image/png">
  <style>
    .thank-you-wrapper {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(118, 138, 120, 0.1); /* sage tint */
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-xl);
      color: var(--color-forest);
    }
    .thank-you-title {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      color: var(--color-forest);
      margin-bottom: var(--space-sm);
    }
    .thank-you-subtitle {
      font-size: 1.1rem;
      color: var(--color-gray-600);
      max-width: 500px;
      margin-bottom: var(--space-xl);
      line-height: 1.6;
    }
    .order-number {
      background: var(--color-sand);
      padding: var(--space-md) var(--space-xl);
      border-radius: var(--radius-md);
      font-family: monospace;
      font-size: 1.2rem;
      color: var(--color-forest);
      margin-bottom: var(--space-2xl);
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <nav id="navbar" class="navbar navbar--solid" role="navigation">
    <div class="nav-container" style="justify-content: center;">
      <a href="../index.html" class="nav-logo" aria-label="Inicio">
        <img src="../assets/logo/Logo.png" alt="Honatu">
      </a>
    </div>
  </nav>

  <main class="thank-you-wrapper">
    <div class="success-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    
    <h1 class="thank-you-title">¡Compra Exitosa!</h1>
    <p class="thank-you-subtitle">
      Hemos recibido tu pedido correctamente. Te enviaremos un correo electrónico con los detalles del envío y el seguimiento de tu paquete muy pronto.
    </p>
    
    <div class="order-number">
      ORDEN #<span id="randomOrderStr">HNT-84729A</span>
    </div>
    
    <a href="tienda.html" class="btn btn-primary">Volver a la Tienda</a>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Honatu. Todos los derechos reservados.</p>
      </div>
    </div>
  </footer>

  <script>
    // Generate random order number
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for ( let i = 0; i < 7; i++ ) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('randomOrderStr').textContent = result;
  </script>
</body>
</html>
